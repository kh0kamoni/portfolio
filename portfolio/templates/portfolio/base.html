<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Khoka Moni — Security Researcher · MEC, DU CSE{% endblock %}</title>
    
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <style>
        /* ════════════════════════════════════════════════
           DESIGN TOKENS  —  "clear water" palette
           Inspired by: glacial meltwater, still alpine lakes,
           light refracting through shallow sea glass.
        ════════════════════════════════════════════════ */
        :root {
            /* water tones */
            --w-deep:      #e8f6fb;   /* deep clear water — almost white aqua */
            --w-surface:   #f0fafd;   /* water surface highlight */
            --w-shallow:   #d6f0f8;   /* shallow reef aqua */
            --w-mid:       #b8e4f4;   /* mid-water blue */
            --w-teal:      #6dbfda;   /* teal current */
            --w-current:   #2a8faf;   /* deeper current */
            --w-depth:     #0d5c76;   /* ocean depth — for headings */
            --w-abyss:     #042d3e;   /* abyssal dark — for body text */

            /* glass surfaces */
            --glass-1:  rgba(255, 255, 255, 0.55);
            --glass-2:  rgba(240, 250, 253, 0.40);
            --glass-3:  rgba(230, 247, 253, 0.25);
            --glass-border: rgba(255, 255, 255, 0.75);
            --glass-blur: blur(20px) saturate(160%);

            /* shadows */
            --shadow-card:  0 8px 32px -12px rgba(13, 92, 118, 0.18);
            --shadow-hover: 0 20px 48px -16px rgba(13, 92, 118, 0.30);
            --shadow-nav:   0 2px 24px -8px  rgba(13, 92, 118, 0.14);

            /* layout */
            --radius-sm:  0.85rem;
            --radius-md:  1.4rem;
            --radius-lg:  2rem;
            --radius-pill: 100px;
            --max-w: 1200px;
            --trans: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ════════════════════════════════════════════════ RESET */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 16px; }

        body {
            font-family: "DM Sans", system-ui, sans-serif;
            color: var(--w-abyss);
            min-height: 100vh;
            /* ── clear water background:
               multiple translucent radial pools of aqua light,
               base is a very pale glacial white-blue ── */
            background:
                radial-gradient(ellipse 60% 40% at 10% 15%,  rgba(174, 228, 248, 0.55) 0%, transparent 55%),
                radial-gradient(ellipse 50% 60% at 88% 80%,  rgba(147, 218, 243, 0.45) 0%, transparent 55%),
                radial-gradient(ellipse 70% 50% at 55% 105%, rgba(200, 240, 252, 0.65) 0%, transparent 50%),
                radial-gradient(ellipse 90% 30% at 50% 0%,   rgba(215, 244, 253, 0.80) 0%, transparent 40%),
                linear-gradient(175deg, #edf8fd 0%, #d8f2fb 35%, #e4f6fc 65%, #f0fafd 100%);
            overflow-x: hidden;
        }

        /* very faint water-light caustic lines */
        body::before {
            content: "";
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: repeating-linear-gradient(
                62deg,
                transparent 0px,
                transparent 18px,
                rgba(255,255,255,0.045) 18px,
                rgba(255,255,255,0.045) 20px
            );
            opacity: 0.6;
        }

        /* ════════════════════════════════════════════════ STICKY NAV */
        nav {
            position: sticky; top: 0; z-index: 200;
            background: rgba(240, 250, 253, 0.72);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid rgba(255,255,255,0.80);
            box-shadow: var(--shadow-nav);
        }

        .nav-inner {
            max-width: var(--max-w); margin: 0 auto;
            padding: 0 2rem; height: 58px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .nav-brand {
            font-size: 0.92rem; font-weight: 600;
            color: var(--w-depth); text-decoration: none;
            display: flex; align-items: center; gap: 0.55rem;
            letter-spacing: 0.01em;
        }

        .nav-brand .drop-icon {
            width: 26px; height: 26px; border-radius: 50%;
            background: linear-gradient(145deg, var(--w-mid), var(--w-teal));
            display: inline-flex; align-items: center; justify-content: center;
            color: #fff; font-size: 0.7rem;
            box-shadow: 0 4px 10px -4px rgba(42,143,175,0.5);
        }

        .nav-links { display: flex; align-items: center; gap: 0.3rem; list-style: none; }

        .nav-links a {
            font-size: 0.84rem; font-weight: 450;
            color: var(--w-current); text-decoration: none;
            padding: 0.4rem 0.85rem; border-radius: var(--radius-pill);
            transition: var(--trans);
        }
        .nav-links a:hover {
            background: rgba(255,255,255,0.6);
            color: var(--w-depth);
        }

        /* ════════════════════════════════════════════════ PAGE WRAPPER */
        .page {
            position: relative; z-index: 10;
            max-width: var(--max-w); margin: 0 auto;
            padding: 3.5rem 2rem 6rem;
        }

        /* ════════════════════════════════════════════════ GLASS CARD BASE */
        .glass {
            background: var(--glass-1);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-card);
        }

        /* ════════════════════════════════════════════════ HERO */
        .hero {
            display: flex; flex-wrap: wrap; gap: 3rem;
            align-items: center;
            border-radius: var(--radius-lg);
            padding: 3.5rem 3.5rem;
            margin-bottom: 2rem;
            /* extra inner sheen at top = water surface */
            box-shadow:
                var(--shadow-card),
                inset 0 1px 0 rgba(255,255,255,0.9);
        }

        .hero-text { flex: 1 1 340px; }

        .hero-eyebrow {
            display: inline-flex; align-items: center; gap: 0.5rem;
            font-size: 0.74rem; font-weight: 600; letter-spacing: 0.14em;
            text-transform: uppercase; color: var(--w-current);
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.75);
            border-radius: var(--radius-pill);
            padding: 0.3rem 0.9rem; margin-bottom: 1.1rem;
        }

        .hero-name {
            font-family: "DM Serif Display", Georgia, serif;
            font-size: clamp(2.1rem, 4.5vw, 3.2rem);
            font-weight: 400; line-height: 1.08;
            color: var(--w-abyss);
            letter-spacing: -0.01em;
            margin-bottom: 1.1rem;
        }

        .hero-name em {
            font-style: italic; color: var(--w-depth);
        }

        .hero-bio {
            font-size: 0.98rem; font-weight: 330; line-height: 1.75;
            color: #1e5469; max-width: 500px;
        }

        .hero-tags {
            display: flex; flex-wrap: wrap; gap: 0.55rem;
            margin-top: 1.6rem;
        }

        .tag {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.78rem; font-weight: 500;
            background: rgba(255,255,255,0.50);
            color: var(--w-depth);
            border: 1px solid rgba(255,255,255,0.80);
            border-radius: var(--radius-pill);
            padding: 0.35rem 0.95rem;
        }
        .tag i { color: var(--w-teal); font-size: 0.72rem; }

        .hero-cta {
            display: flex; gap: 0.75rem; flex-wrap: wrap;
            margin-top: 2rem;
        }

        /* CTA Buttons */
        .btn {
            display: inline-flex; align-items: center; gap: 0.45rem;
            font-family: "DM Sans", sans-serif;
            font-size: 0.85rem; font-weight: 550;
            padding: 0.65rem 1.55rem;
            border-radius: var(--radius-pill);
            text-decoration: none; cursor: pointer; border: none;
            transition: var(--trans); white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--w-depth) 0%, var(--w-current) 100%);
            color: #fff;
            box-shadow: 0 8px 22px -8px rgba(13, 92, 118, 0.50);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px -10px rgba(13, 92, 118, 0.55);
        }

        .btn-ghost {
            background: rgba(255,255,255,0.52);
            color: var(--w-depth);
            border: 1px solid rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
        }
        .btn-ghost:hover {
            background: rgba(255,255,255,0.80);
            transform: translateY(-2px);
        }

        /* Avatar */
        .hero-avatar {
            flex: 0 0 auto; position: relative;
            width: 148px; height: 148px; border-radius: 50%;
            background: linear-gradient(145deg, var(--w-shallow) 0%, var(--w-mid) 50%, var(--w-teal) 100%);
            border: 4px solid rgba(255,255,255,0.90);
            box-shadow:
                0 20px 40px -16px rgba(13, 92, 118, 0.45),
                inset 0 2px 4px rgba(255,255,255,0.8);
            display: flex; align-items: center; justify-content: center;
        }

        .hero-avatar span {
            font-family: "DM Serif Display", serif;
            font-size: 2.6rem; font-weight: 400; color: var(--w-depth);
            letter-spacing: -0.02em; user-select: none;
        }

        /* water ripple ring */
        .hero-avatar::after {
            content: "";
            position: absolute; inset: -12px;
            border-radius: 50%;
            border: 1.5px solid rgba(109, 191, 218, 0.35);
            animation: ripple 3s ease-in-out infinite;
        }
        @keyframes ripple {
            0%, 100% { transform: scale(1);   opacity: 0.7; }
            50%       { transform: scale(1.04); opacity: 0.3; }
        }

        /* ════════════════════════════════════════════════ STATS ROW */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem; margin-bottom: 2.2rem;
        }

        .stat-card {
            border-radius: var(--radius-md);
            padding: 1.4rem 1.5rem;
            text-align: center;
            box-shadow:
                var(--shadow-card),
                inset 0 1px 0 rgba(255,255,255,0.90);
            transition: var(--trans);
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }

        .stat-val {
            font-family: "DM Serif Display", serif;
            font-size: 2.1rem; font-weight: 400;
            color: var(--w-depth); line-height: 1;
        }

        .stat-lbl {
            font-size: 0.75rem; font-weight: 480;
            color: var(--w-current); margin-top: 0.35rem;
            line-height: 1.35;
        }

        /* ════════════════════════════════════════════════ SECTION LABELS */
        .sec-eye {
            font-size: 0.70rem; font-weight: 700; letter-spacing: 0.18em;
            text-transform: uppercase; color: var(--w-teal);
            margin-bottom: 0.35rem;
        }
        .sec-title {
            font-family: "DM Serif Display", serif;
            font-size: 1.5rem; font-weight: 400;
            color: var(--w-abyss); margin-bottom: 1.5rem;
        }

        /* ════════════════════════════════════════════════ RESEARCH GRID */
        .research-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 1.1rem; margin-bottom: 2.2rem;
        }

        .res-card {
            border-radius: var(--radius-md);
            padding: 1.7rem 1.2rem 1.5rem;
            text-align: center;
            transition: var(--trans);
            box-shadow:
                var(--shadow-card),
                inset 0 1px 0 rgba(255,255,255,0.90);
        }
        .res-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            background: var(--glass-1);
        }

        .res-icon {
            width: 54px; height: 54px; border-radius: 1.1rem;
            background: linear-gradient(145deg, rgba(255,255,255,0.90), rgba(216,242,251,0.75));
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.45rem; color: var(--w-current);
            margin-bottom: 1rem;
            box-shadow: 0 4px 12px -6px rgba(42,143,175,0.25),
                        inset 0 1px 2px rgba(255,255,255,1);
        }

        .res-card h4 {
            font-size: 0.88rem; font-weight: 600;
            color: var(--w-abyss); margin-bottom: 0.3rem; line-height: 1.3;
        }

        .res-card p {
            font-size: 0.76rem; font-weight: 380;
            color: var(--w-current); line-height: 1.55;
        }

        /* ════════════════════════════════════════════════ TWO COL */
        .two-col {
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            gap: 1.5rem; margin-bottom: 2.2rem;
        }

        /* PANEL */
        .panel {
            border-radius: var(--radius-md);
            padding: 2rem 2.2rem;
            box-shadow:
                var(--shadow-card),
                inset 0 1px 0 rgba(255,255,255,0.90);
        }

        /* ════════════════════════════════════════════════ PUBLICATIONS */
        .pub-list { list-style: none; }

        .pub-item {
            padding: 1.05rem 0;
            border-bottom: 1px solid rgba(184,228,244,0.35);
        }
        .pub-item:last-child { border-bottom: none; }

        .pub-type {
            display: inline-block;
            font-size: 0.68rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--w-current);
            background: rgba(184,228,244,0.40);
            border: 1px solid rgba(255,255,255,0.70);
            border-radius: var(--radius-pill);
            padding: 0.15rem 0.7rem;
            margin-bottom: 0.35rem;
        }

        .pub-title {
            font-size: 0.91rem; font-weight: 520;
            color: var(--w-abyss); line-height: 1.45;
            margin-bottom: 0.25rem;
        }

        .pub-authors {
            font-size: 0.77rem; font-weight: 350;
            color: var(--w-current); font-style: italic;
        }

        /* ════════════════════════════════════════════════ TIMELINE */
        .timeline { list-style: none; }

        .tl-row {
            display: flex; align-items: flex-start; gap: 1rem;
            padding: 0.95rem 0;
            border-bottom: 1px solid rgba(184,228,244,0.35);
        }
        .tl-row:last-child { border-bottom: none; }

        .tl-marker {
            flex: 0 0 10px; width: 10px; height: 10px; border-radius: 50%;
            background: var(--w-teal); margin-top: 5px;
            box-shadow: 0 0 0 3px rgba(109,191,218,0.25);
        }

        .tl-body { flex: 1; }

        .tl-role {
            font-size: 0.90rem; font-weight: 580;
            color: var(--w-abyss); line-height: 1.3;
        }
        .tl-org {
            font-size: 0.79rem; font-weight: 380;
            color: var(--w-current); margin-top: 1px;
        }

        .tl-date {
            flex: 0 0 auto;
            font-size: 0.72rem; font-weight: 560; color: var(--w-depth);
            background: rgba(184,228,244,0.40);
            border: 1px solid rgba(255,255,255,0.70);
            border-radius: var(--radius-pill);
            padding: 0.18rem 0.75rem; white-space: nowrap;
        }

        /* Skills */
        .chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.9rem; }

        .chip {
            font-size: 0.76rem; font-weight: 480;
            background: rgba(255,255,255,0.52);
            color: var(--w-depth);
            border: 1px solid rgba(255,255,255,0.80);
            border-radius: var(--radius-pill);
            padding: 0.28rem 0.85rem;
        }

        /* ════════════════════════════════════════════════ CONTACT */
        .contact-panel {
            border-radius: var(--radius-lg);
            padding: 2.6rem 3rem;
            margin-bottom: 0;
            box-shadow:
                var(--shadow-card),
                inset 0 1px 0 rgba(255,255,255,0.90);
        }

        .contact-bio {
            font-size: 0.96rem; font-weight: 330; line-height: 1.75;
            color: #1e5469; max-width: 580px; margin-bottom: 1.6rem;
        }

        .contact-links {
            display: flex; flex-wrap: wrap; gap: 0.75rem;
        }

        .clink {
            display: inline-flex; align-items: center; gap: 0.5rem;
            font-size: 0.84rem; font-weight: 500;
            color: var(--w-depth); text-decoration: none;
            background: rgba(255,255,255,0.55);
            border: 1px solid rgba(255,255,255,0.80);
            border-radius: var(--radius-pill);
            padding: 0.55rem 1.25rem; transition: var(--trans);
        }
        .clink i { color: var(--w-teal); }
        .clink:hover {
            background: rgba(255,255,255,0.85);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -8px rgba(13,92,118,0.20);
        }

        /* ════════════════════════════════════════════════ FOOTER */
        .site-footer {
            position: relative; z-index: 10;
            max-width: var(--max-w); margin: 0 auto;
            padding: 1.5rem 2rem 2.5rem;
            border-top: 1px solid rgba(184,228,244,0.50);
            display: flex; flex-wrap: wrap; gap: 0.75rem;
            justify-content: space-between; align-items: center;
        }

        .site-footer p {
            font-size: 0.78rem; color: var(--w-current); font-weight: 400;
        }

        .pulse-dot {
            display: inline-block; width: 7px; height: 7px;
            background: var(--w-teal); border-radius: 50%;
            margin-right: 7px; vertical-align: middle;
            animation: pulse 2.8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(109,191,218,0.7); }
            50%       { box-shadow: 0 0 0 5px rgba(109,191,218,0); }
        }

        /* ════════════════════════════════════════════════ DIVIDER UTIL */
        .divider {
            border: none;
            border-top: 1px solid rgba(184,228,244,0.40);
            margin: 2rem 0;
        }

        /* ════════════════════════════════════════════════ RESPONSIVE */
        @media (max-width: 820px) {
            .two-col { grid-template-columns: 1fr; }
            .hero { padding: 2.5rem 2rem; }
            .contact-panel { padding: 2rem 1.8rem; }
        }

        @media (max-width: 560px) {
            .page { padding: 2rem 1.1rem 4rem; }
            nav .nav-links { display: none; }
            .hero { padding: 2rem 1.4rem; gap: 2rem; }
            .hero-avatar { width: 110px; height: 110px; }
        }

        /* Alert messages */
        .alert {
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            border-radius: var(--radius-md);
            position: relative;
            animation: slideDown 0.3s ease;
        }
        .alert-success {
            background: rgba(109, 191, 218, 0.2);
            border: 1px solid var(--w-teal);
            color: var(--w-depth);
        }
        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }
        .page-link {
            padding: 0.5rem 1rem;
            border-radius: var(--radius-pill);
            background: rgba(255,255,255,0.5);
            color: var(--w-depth);
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.8);
            transition: var(--trans);
        }
        .page-link:hover {
            background: rgba(255,255,255,0.8);
            transform: translateY(-2px);
        }
        .page-current {
            padding: 0.5rem 1rem;
            background: var(--w-teal);
            color: white;
            border-radius: var(--radius-pill);
        }
    </style>
</head>
<body>
    {% include 'portfolio/partials/navbar.html' %}
    
    <main class="page">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} glass">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}{% endblock %}
    </main>
    
    {% include 'portfolio/partials/footer.html' %}
</body>
</html>
